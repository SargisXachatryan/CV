<body>
  <div id="root"></div>
  <!-- ============================================================
  GitHub Pages SPA fix — paste this script into the <head> of
  your  public/index.html  BEFORE any other scripts.
  Works together with 404.html which redirects unknown paths
  back to index with ?p=<encoded-path>.
  ============================================================ -->
  <script>
    (function () {
      var query = window.location.search;
      if (query.startsWith('?p=')) {
        var restored = decodeURIComponent(query.slice(3));
        // Restore the real URL without triggering a page reload
        window.history.replaceState(
          null, null,
          window.location.pathname.split('/').slice(0, 2).join('/') +
          '/' + restored
        );
      }
    })();
  </script>
</body>
